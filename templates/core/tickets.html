{% extends "base.html" %}
{% load static %}

{% block content %}
  <h2 class="section-title">选择球队购票</h2>
  <p style="margin-bottom:1rem;">请选择您要观看的球队，查看其下一场比赛的购票信息。</p>
  <div class="team-grid">
    {% for team in teams %}
      <a href="{% url 'core:team_tickets' team.pk %}" class="team-card">
        {% if team.get_logo_filename %}
          <img src="{% static 'images/teams/' %}{{ team.get_logo_filename }}" alt="{{ team.short_name }}" class="team-logo">
        {% endif %}
        <span>{{ team.short_name }}</span>
      </a>
    {% endfor %}
  </div>
  <p style="margin-top:1.5rem;">
    <a href="{% url 'core:tickets_logout' %}">退出登录</a>
  </p>
{% endblock %}
