{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}中超赛事管理{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{% url 'core:home' %}" style="color:inherit;text-decoration:none;">中超赛事管理</a></h1>
      <nav class="nav-buttons">
        <a href="{% url 'core:home' %}" class="nav-btn {% if request.resolver_match.url_name == 'home' %}active{% endif %}">首页</a>
        <a href="{% url 'core:tickets' %}" class="nav-btn {% if request.resolver_match.url_name == 'tickets' %}active{% endif %}">购票</a>
        <a href="{% url 'core:schedule' %}" class="nav-btn {% if request.resolver_match.url_name == 'schedule' %}active{% endif %}">赛程</a>
        <a href="{% url 'core:team_standings' %}" class="nav-btn {% if request.resolver_match.url_name == 'team_standings' %}active{% endif %}">球队榜</a>
        <a href="{% url 'core:player_rankings' %}" class="nav-btn {% if request.resolver_match.url_name == 'player_rankings' %}active{% endif %}">球员榜</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
